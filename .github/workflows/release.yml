name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(release): v') }}"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Lint code
        run: npm run lint

      - name: Run unit and component tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run sandbox end-to-end tests
        run: npm run test:e2e

      - name: Bump package version
        run: npm version patch --no-git-tag-version

      - name: Sync extension manifest version
        run: npm run version:sync

      - name: Read release version
        id: version
        run: echo "value=$(npm pkg get version | tr -d '\"')" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: npm run zip

      - name: Commit and tag release
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json public/manifest.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          files: fluency-extension.zip
